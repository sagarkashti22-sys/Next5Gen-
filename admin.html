<!DOCTYPE html>
<html>
<head>
<title>Next5Gen Admin</title>

<script>

function savePost(){

let title=document.getElementById("title").value;
let desc=document.getElementById("desc").value;
let img=document.getElementById("img").value;

let postHTML=`
<!DOCTYPE html>
<html>
<head>
<title>${title}</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#f4f7ff;margin:0;}
.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
margin-top:40px;
border-radius:12px;
}
img{width:100%;border-radius:10px;}
</style>
</head>

<body>

<div class="container">
<h1>${title}</h1>
<img src="${img}">
<p>${desc}</p>
</div>

</body>
</html>
`;

let blob=new Blob([postHTML],{type:"text/html"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download=title+".html";
link.click();

}

</script>

</head>

<body>

<h2>Next5Gen Post Creator</h2>

<input id="title" placeholder="Post Title"><br><br>
<textarea id="desc" placeholder="Post Content"></textarea><br><br>
<input id="img" placeholder="Image Link"><br><br>

<button onclick="savePost()">Generate Post File</button>

</body>
</html>
