<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next5Gen Blog</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* DARK MODE */
body{
background:#f4f7ff;
transition:0.4s;
}

body.dark{
background:#0f172a;
color:white;
}

/* HEADER */
header{
background:linear-gradient(45deg,#4e73df,#1cc88a);
padding:15px 5%;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
position:sticky;
top:0;
z-index:1000;
flex-wrap:wrap;
}

.logo svg{
height:45px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{filter: drop-shadow(0 0 5px yellow);}
to{filter: drop-shadow(0 0 20px white);}
}

/* NAV */
nav ul{
display:flex;
list-style:none;
gap:20px;
}

nav ul li{
cursor:pointer;
font-weight:500;
padding:5px 10px;
border-radius:5px;
transition:0.3s;
}

nav ul li:hover,
nav ul li.active{
background:rgba(255,255,255,0.3);
}

/* SEARCH */
.search-box{
display:flex;
align-items:center;
background:white;
border-radius:20px;
padding:5px 10px;
margin-top:10px;
}

.search-box input{
border:none;
outline:none;
padding:5px;
width:160px;
}

.search-box button{
border:none;
background:none;
cursor:pointer;
font-size:18px;
}

/* DARK MODE SEARCH */
body.dark .search-box{
background:#1e293b;
}

body.dark .search-box input{
background:transparent;
color:white;
}

/* HERO */
.hero{
background:linear-gradient(to right,#4e73df,#36b9cc);
color:white;
padding:60px 5%;
text-align:center;
}

.hero h1{
font-size:40px;
margin-bottom:15px;
}

/* POSTS */
.container{
padding:40px 5%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.4s;
}

body.dark .card{
background:#1e293b;
color:white;
}

.card.hide{
display:none;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card h3{
margin-bottom:10px;
color:#4e73df;
}

body.dark .card h3{
color:#00c6ff;
}

.category{
display:inline-block;
background:#1cc88a;
color:white;
padding:5px 10px;
border-radius:5px;
font-size:12px;
margin-bottom:10px;
}

/* FOOTER */
footer{
background:#2e2e2e;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

.dark-toggle{
background:white;
border:none;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
margin-left:10px;
}

</style>
</head>

<body>

<header>

<div class="logo">
<svg viewBox="0 0 400 100">
<defs>
<linearGradient id="grad1">
<stop offset="0%" stop-color="#ffdd00"/>
<stop offset="100%" stop-color="#ffffff"/>
</linearGradient>
</defs>
<text x="0" y="65" font-size="60" font-weight="700" fill="url(#grad1)">
Next5Gen
</text>
</svg>
</div>

<nav>
<ul id="menu">
<li class="active" onclick="filterPosts('all',this)">Home</li>
<li onclick="filterPosts('education',this)">Education</li>
<li onclick="filterPosts('technology',this)">Technology</li>
<li onclick="filterPosts('health',this)">Health</li>
<li onclick="filterPosts('lifestyle',this)">Lifestyle</li>
</ul>
</nav>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search posts...">
<button onclick="applyFilters()">🔍</button>

<button class="dark-toggle" onclick="toggleDark()">🌙</button>

</div>

</header>

<section class="hero">
<h1>Welcome to Next5Gen Blog</h1>
<p>Education | Technology | Health | Lifestyle</p>
</section>

<section class="container" id="posts">

<!-- POSTS SAME AS YOUR OLD CODE -->

</section>

<footer>
© 2026 Next5Gen Blog | Designed by Next5Gen
</footer>

<script>

/* CATEGORY FILTER */
let currentCategory="all";

function filterPosts(category,element){
currentCategory=category;

document.querySelectorAll("#menu li").forEach(li=>{
li.classList.remove("active");
});

element.classList.add("active");

applyFilters();
}

/* SEARCH + FILTER */
function applyFilters(){
let input=document.getElementById("searchInput").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
let title=card.querySelector("h3").innerText.toLowerCase();
let desc=card.querySelector("p").innerText.toLowerCase();

let categoryMatch=(currentCategory==="all" || card.dataset.category===currentCategory);
let searchMatch=(title.includes(input) || desc.includes(input));

if(categoryMatch && searchMatch){
card.style.display="block";
}else{
card.style.display="none";
}
});
}

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
