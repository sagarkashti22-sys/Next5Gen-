<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next5Gen Post</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:Poppins,sans-serif;
background:#f4f7ff;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
margin-top:40px;
}

img{
width:100%;
border-radius:10px;
margin-bottom:20px;
}

h1{
color:#4e73df;
}

p{
line-height:1.7;
}

</style>

</head>

<body>

<div class="container">

<h1 id="title"></h1>
<img id="image">
<p id="desc"></p>

</div>

<script>

const params=new URLSearchParams(window.location.search);

document.getElementById("title").innerText=params.get("title") || "Next5Gen Article";

document.getElementById("desc").innerText=params.get("desc") || "Article content will appear here.";

document.getElementById("image").src=params.get("img") || "";

</script>

</body>
</html>
