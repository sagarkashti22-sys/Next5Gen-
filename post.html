<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article - Next5Gen</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#fff;
padding:20px;
}

.article{
max-width:800px;
margin:auto;
background:#fff;
color:#000;
padding:30px;
border-radius:15px;
}

.article-img{
height:300px;
background-size:cover;
background-position:center;
border-radius:10px;
margin-bottom:20px;
}

.back{
display:inline-block;
margin-top:20px;
padding:8px 15px;
background:#0077ff;
color:#fff;
border-radius:20px;
text-decoration:none;
}
</style>
</head>

<body>

<div class="article">
<div class="article-img" id="articleImage"></div>
<h1 id="articleTitle"></h1>

<p>
Yaha aap apna full article content likh sakte ho. Isko replace karke apna 1000-2000 words ka content paste kar sakte ho.
</p>

<a href="index.html" class="back">Back to Home</a>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const category=params.get("category");

const img=document.getElementById("articleImage");

if(category==="education"){
img.style.backgroundImage="url('https://source.unsplash.com/800x500/?education')";
}
if(category==="technology"){
img.style.backgroundImage="url('https://source.unsplash.com/800x500/?technology')";
}
if(category==="health"){
img.style.backgroundImage="url('https://source.unsplash.com/800x500/?health')";
}
if(category==="lifestyle"){
img.style.backgroundImage="url('https://source.unsplash.com/800x500/?lifestyle')";
}

document.getElementById("articleTitle").innerText=params.get("title");
</script>

</body>
</html>
